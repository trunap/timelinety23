<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garis Waktu Lengkap Alkitab - Ultimate UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #cf5e29; --primary-light: #e27645;
            --secondary: #748c8d; --secondary-light: #9ab4b5;
            --green: #5c8d60; --green-light: #7ca880;
            --jesus-grey: #8c9294;
            --judah: #8e44ad; --israel: #2980b9;
            --bg-color: #fdfbf7; --text-dark: #2c3e50;
            
            --max-year: 4100; 
            --min-year: -120; 
            --total-years: calc(var(--max-year) - var(--min-year));
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-color);
            margin: 0; padding: 0; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- HEADER --- */
        .header {
            background: white; padding: 15px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px; z-index: 1000;
        }
        .header h1 { color: #2c4c4d; margin: 0; font-size: 22px; font-weight: 700; line-height: 1.2; }
        .header p { margin: 2px 0 0 0; color: #777; font-size: 12px; }
        .jump-nav { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-nav {
            background: rgba(44, 76, 77, 0.08); color: #2c4c4d; border: none;
            padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; font-family: inherit;
        }
        .btn-nav:hover { background: var(--primary); color: white; }

        /* --- WRAPPER UTAMA (SCROLL AREA) --- */
        .scroll-wrapper {
            flex: 1; width: 100%; overflow: auto; position: relative;
            scroll-behavior: smooth; cursor: grab; background: #faf9f5;
        }
        .scroll-wrapper.active { cursor: grabbing; }

        /* --- KANVAS LEBAR --- */
        .canvas {
            width: 14000px; /* Panjang Kanvas */
            min-height: 100%; position: relative; display: flex; flex-direction: column;
        }

        /* --- GRID LINES (Garis bantu vertikal) --- */
        .grid-line {
            position: absolute; top: 0; bottom: 0; width: 1px;
            background: rgba(44, 76, 77, 0.1); border-right: 1px dashed rgba(255,255,255,0.5); z-index: 1; pointer-events: none;
        }

        /* --- 1. PANEL ATAS MELAYANG (STICKY TOP) --- */
        .sticky-top {
            position: sticky; top: 0; left: 0; width: 100%; z-index: 900;
            background: rgba(253, 251, 247, 0.95); backdrop-filter: blur(8px);
            border-bottom: 2px solid rgba(0,0,0,0.05); box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        /* Track Kuasa Dunia */
        .track-power { height: 35px; width: 100%; position: relative; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .power-item { position: absolute; height: 100%; display: flex; align-items: center; color: white; font-size: 11px; font-weight: 800; letter-spacing: 1px; box-shadow: inset 0 -2px 5px rgba(0,0,0,0.15); }
        .power-item span { position: sticky; left: 20px; padding-left: 10px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        /* Track Zona Era */
        .track-era { height: 35px; width: 100%; position: relative; display: flex; align-items: center; background: rgba(0,0,0,0.02); }
        .era-item { position: absolute; height: 100%; display: flex; align-items: center; border-left: 2px dashed rgba(44, 76, 77, 0.4); }
        .era-item span { position: sticky; left: 20px; padding-left: 10px; font-size: 11px; font-weight: 700; color: #2c4c4d; }

        /* --- 2. KONTEN TENGAH (BARS & EVENTS) --- */
        .content-area {
            position: relative; flex: 1; width: 100%; z-index: 10; margin-top: 20px; min-height: 800px;
        }

        /* Desain Bar Tokoh */
        .bar { position: absolute; height: 14px; border-radius: 7px; display: flex; align-items: center; box-shadow: 0 4px 8px rgba(0,0,0,0.15); transition: transform 0.2s; cursor: pointer; }
        .bar:hover { transform: scaleY(1.4); z-index: 50; }
        .bar-label { position: absolute; top: -18px; font-size: 11px; font-weight: 600; white-space: nowrap; text-shadow: 1px 1px 2px #fff, -1px -1px 2px #fff, 0 0 5px #fff; pointer-events: none; }
        
        .bar.main { background: linear-gradient(180deg, var(--primary-light), var(--primary)); }
        .bar.sub { background: linear-gradient(180deg, var(--secondary-light), var(--secondary)); }
        .bar.pb { background: linear-gradient(180deg, var(--green-light), var(--green)); }
        .bar.jesus { background: var(--jesus-grey); border: 1px solid #777; }
        .bar.judah { background: linear-gradient(180deg, #a55eea, var(--judah)); }
        .bar.israel { background: linear-gradient(180deg, #45aaf2, var(--israel)); }

        .bar.main .bar-label { color: #b84b1b; }
        .bar.sub .bar-label { color: #4b6566; }
        .bar.pb .bar-label { color: #3e6341; }
        .bar.jesus .bar-label { color: #222; }
        .bar.judah .bar-label { color: var(--judah); }
        .bar.israel .bar-label { color: var(--israel); }

        .bar.fade-left { background: linear-gradient(90deg, rgba(0,0,0,0) 0%, currentColor 30%); box-shadow: none; }
        .bar.fade-both { background: linear-gradient(90deg, rgba(0,0,0,0) 0%, currentColor 20%, currentColor 80%, rgba(0,0,0,0) 100%); box-shadow: none; }

        /* Desain Event Peristiwa */
        .event { position: absolute; display: flex; flex-direction: column; align-items: center; transform: translateX(-50%); width: 220px; z-index: 5; }
        .event-dot { width: 14px; height: 14px; background: white; border: 4px solid var(--primary); border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2); position: relative; z-index: 2; transition: all 0.2s; }
        .event-year { font-weight: 800; font-size: 12px; color: var(--primary); margin-top: 5px; background: rgba(255,255,255,0.8); padding: 0 4px; border-radius: 4px; }
        .event-desc { font-size: 11px; text-align: center; line-height: 1.3; font-weight: 500; color: #444; background: rgba(255,255,255,0.7); padding: 4px; border-radius: 4px; }
        
        .event:hover { z-index: 60; }
        .event:hover .event-dot { transform: scale(1.4); border-color: #ff4757; }
        
        /* Desain Perjanjian Bercahaya */
        .covenant {
            font-weight: 800; font-style: italic; color: #d35400;
            background: #fff3e0; border: 1px solid #f39c12;
            padding: 4px 8px; border-radius: 6px; font-size: 11px !important;
            box-shadow: 0 0 12px rgba(243, 156, 18, 0.4); display: inline-block; margin-top: 3px;
        }

        /* --- 3. SUMBU WAKTU MELAYANG (STICKY BOTTOM) --- */
        .sticky-bottom {
            position: sticky; bottom: 0; left: 0; width: 100%; z-index: 900;
            background: linear-gradient(90deg, #b84b1b 0%, #e28e40 50%, #eebb66 100%);
            height: 45px; display: flex; align-items: center;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.15); border-top: 1px solid rgba(255,255,255,0.2);
        }
        .axis-marker { position: absolute; color: white; font-weight: 700; font-size: 12px; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .axis-marker::before { content: ''; width: 2px; height: 6px; background: white; margin-bottom: 3px; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>Garis Waktu Alkitab (UI Interaktif)</h1>
            <p>Sistem Navigasi Cerdas & Sumbu Dinamis | 4100 SM - 100 M</p>
        </div>
        <div class="jump-nav">
            <button class="btn-nav" onclick="scrollToYear(4026)">Adam</button>
            <button class="btn-nav" onclick="scrollToYear(2018)">Musa</button>
            <button class="btn-nav" style="color:var(--judah);" onclick="scrollToYear(1100)">Raja-Raja</button>
            <button class="btn-nav" onclick="scrollToYear(607)">Babilon</button>
            <button class="btn-nav" style="background:var(--green);color:white;" onclick="scrollToYear(33)">Zaman Rasul</button>
        </div>
    </div>

    <div class="scroll-wrapper" id="scrollWrapper">
        <div class="canvas" id="timelineCanvas">
            
            <div id="gridContainer"></div>

            <div class="sticky-top">
                <div class="track-power" id="powerTrack">
                    </div>
                <div class="track-era" id="eraTrack">
                    </div>
            </div>

            <div class="content-area" id="contentArea">
                </div>

            <div class="sticky-bottom" id="axisTrack">
                </div>

        </div>
    </div>

    <script>
        const MAX_YEAR = 4100;
        const MIN_YEAR = -120;
        const TOTAL_YEARS = MAX_YEAR - MIN_YEAR;

        function getLeft(year) { return ((MAX_YEAR - year) / TOTAL_YEARS) * 100; }
        function getWidth(start, end) { return ((start - end) / TOTAL_YEARS) * 100; }

        // --- DATA KUASA DUNIA ---
        const powers = [
            { s: 4100, e: 740, name: "MESIR", color: "#8c7647" },
            { s: 740, e: 607, name: "ASIRIA", color: "#2c3e50" },
            { s: 607, e: 537, name: "BABILON", color: "#b84b1b" },
            { s: 537, e: 332, name: "MEDIA-PERSIA", color: "#2980b9" },
            { s: 332, e: 63, name: "YUNANI", color: "linear-gradient(90deg, #4a6984, #c04e3c)" },
            { s: 63, e: -120, name: "ROMA", color: "#c04e3c" }
        ];

        // --- DATA ZONA ERA ---
        const eras = [
            { s: 1117, e: 997, name: "Kerajaan Israel Belum Terbagi" },
            { s: 997, e: 607, name: "Kerajaan Israel Terbagi" },
            { s: 607, e: 537, name: "Penawanan di Babilon" },
            { s: 537, e: 400, name: "Setelah Masa Penawanan" },
            { s: 75, e: -120, name: "Zaman Yesus dan Para Pengikutnya ➔", color: "#5c8d60" }
        ];

        // --- DATA BARS ---
        const barsData = [
            // Utama & Pendukung (PL)
            { s: 4026, e: 3096, l: "Adam (930 Thn)", t: "sub" }, { s: 3896, e: 2984, l: "Set", t: "sub" },
            { s: 3404, e: 3039, l: "Henokh", t: "main" }, { s: 3339, e: 2370, l: "Metusalah", t: "sub" },
            { s: 3152, e: 2377, l: "Lamekh", t: "sub" }, { s: 2970, e: 2020, l: "Nuh", t: "main" },
            { s: 2468, e: 1868, l: "Sem", t: "sub" }, { s: 2018, e: 1843, l: "Abraham", t: "main" },
            { s: 1990, e: 1881, l: "Sara", t: "sub", f: "fade-left" }, { s: 1918, e: 1738, l: "Ishak", t: "main" },
            { s: 1880, e: 1750, l: "Ribka", t: "sub", f: "fade-both" }, { s: 1858, e: 1711, l: "Yakub & Esau", t: "main" },
            { s: 1795, e: 1700, l: "Ismael", t: "sub" }, { s: 1767, e: 1657, l: "Yusuf", t: "main" },
            { s: 1650, e: 1470, l: "Syifra, Pua, Amram, Yokhebed, Miriam", t: "sub", f: "fade-both" },
            { s: 1593, e: 1473, l: "Musa", t: "main" }, { s: 1560, e: 1450, l: "Yosua", t: "sub", f: "fade-left" },
            { s: 1550, e: 1430, l: "Kaleb", t: "sub", f: "fade-left" }, { s: 1500, e: 1400, l: "Rahab", t: "sub", f: "fade-left" },
            { s: 1430, e: 1100, l: "Hakim: Naomi, Rut, Debora, Gideon, Simson, Yefta", t: "sub", f: "fade-both" },
            { s: 1150, e: 1020, l: "Samuel", t: "sub", f: "fade-both" }, { s: 1107, e: 1037, l: "Daud", t: "main" },
            { s: 1100, e: 1007, l: "Yonatan", t: "sub", f: "fade-right" }, { s: 1055, e: 995, l: "Abigail, Natan", t: "sub", f: "fade-both" },
            { s: 920, e: 890, l: "Elia", t: "sub", f: "fade-both" }, { s: 893, e: 840, l: "Elisa", t: "main" },
            { s: 778, e: 732, l: "Yesaya", t: "sub", f: "fade-both" }, { s: 647, e: 580, l: "Yeremia", t: "sub", f: "fade-both" },
            { s: 613, e: 591, l: "Yehezkiel", t: "sub", f: "fade-both" }, { s: 625, e: 535, l: "Daniel", t: "sub", f: "fade-both" },
            { s: 465, e: 425, l: "Nehemia & Ezra", t: "sub", f: "fade-both" },

            // Raja Yehuda (Ungu)
            { s: 997, e: 980, l: "Rehoboam", t: "judah" }, { s: 980, e: 978, l: "Abiya", t: "judah" }, { s: 978, e: 937, l: "Asa", t: "judah" },
            { s: 937, e: 913, l: "Yehosyafat", t: "judah" }, { s: 913, e: 906, l: "Yehoram", t: "judah" }, { s: 898, e: 858, l: "Yehoas", t: "judah" },
            { s: 858, e: 829, l: "Amazia", t: "judah" }, { s: 829, e: 777, l: "Uzzia", t: "judah" }, { s: 746, e: 716, l: "Hizkia", t: "judah" },
            { s: 716, e: 661, l: "Manasye", t: "judah" }, { s: 659, e: 628, l: "Yosia", t: "judah" }, { s: 617, e: 607, l: "Zedekia", t: "judah" },

            // Raja Israel (Biru)
            { s: 997, e: 976, l: "Yeroboam", t: "israel" }, { s: 975, e: 952, l: "Baasya", t: "israel" }, { s: 947, e: 940, l: "Omri", t: "israel" },
            { s: 940, e: 920, l: "Ahab", t: "israel" }, { s: 905, e: 876, l: "Yehu", t: "israel" }, { s: 844, e: 803, l: "Yeroboam II", t: "israel" },
            { s: 778, e: 758, l: "Pekah", t: "israel" }, { s: 758, e: 740, l: "Hosyea", t: "israel" },

            // PB (Hijau/Abu)
            { s: 80, e: -10, l: "Zakharia & Elisabet", t: "pb", f: "fade-both" }, { s: 35, e: -50, l: "Maria (ibu Yesus)", t: "pb", f: "fade-both" },
            { s: 40, e: -20, l: "Yusuf (Suami)", t: "pb", f: "fade-both" }, { s: 2, e: -32, l: "Yohanes Pembaptis", t: "pb" },
            { s: 2, e: -33, l: "Yesus", t: "jesus" }, { s: 10, e: -65, l: "Petrus", t: "pb", f: "fade-both" },
            { s: -5, e: -65, l: "Paulus", t: "pb", f: "fade-both" }, { s: -5, e: -100, l: "Rasul Yohanes", t: "pb", f: "fade-both" }
        ];

        // --- DATA EVENTS ---
        const eventsData = [
            { y: 4026, d: "Adam diciptakan" }, { y: 3404, d: "Henokh lahir" }, { y: 2370, d: "Air Bah Turun" },
            { y: 1943, d: "Perjanjian Abraham Berlaku", cov: true }, { y: 1728, d: "Keluarga Yakub pindah ke Mesir" },
            { y: 1513, d: "Israel keluar dari Mesir / Laut Merah" }, { y: 1473, d: "Israel masuk ke Kanaan" },
            { y: 1117, d: "Samuel mengurapi Saul" }, { y: 1107, d: "Kelahiran Daud" }, { y: 1100, d: "Buku Hakim-Hakim selesai" },
            { y: 1070, d: "Daud raja seluruh Israel;<br>Perjanjian Kerajaan", cov: true }, { y: 1027, d: "Bait Salomo Selesai" },
            { y: 997, d: "Israel Terpecah Dua" }, { y: 905, d: "Ratu Atalya merebut takhta" },
            { y: 844, d: "Yunus menulis buku Yunus" }, { y: 740, d: "Asyur menaklukkan Israel (Utara)" },
            { y: 632, d: "Niniwe jatuh" }, { y: 607, d: "Yerusalem dan bait dihancurkan Babilon" },
            { y: 539, d: "Babel jatuh ke Media-Persia" }, { y: 537, d: "Dekrit Kores; Yahudi kembali" },
            { y: 515, d: "Zerubabel selesai bangun bait kedua" }, { y: 455, d: "Tembok dibangun; nubuat 70 minggu" },
            { y: 165, d: "Bait disucikan (Penahbisan)" }, { y: 63, d: "Roma menguasai Yerusalem" },
            { y: 2, d: "Kelahiran Yesus" }, { y: -29, d: "Yohanes dan Yesus memulai pelayanan" },
            { y: -33, d: "Korban Yesus;<br>Perjanjian Baru", cov: true }, { y: -36, d: "Bangsa lain pertama dibaptis (Kornelius)" },
            { y: -41, d: "Matius menulis Injil" }, { y: -49, d: "Keputusan Sunat Badan Pimpinan" },
            { y: -70, d: "Yerusalem dihancurkan Roma" }, { y: -98, d: "Alkitab Selesai Ditulis" }
        ];

        // 1. RENDER KUASA DUNIA
        const powerTrack = document.getElementById('powerTrack');
        powers.forEach(p => {
            let div = document.createElement('div');
            div.className = 'power-item';
            div.style.left = `${getLeft(p.s)}%`;
            div.style.width = `${getWidth(p.s, p.e)}%`;
            div.style.background = p.color;
            div.innerHTML = `<span>${p.name}</span>`;
            powerTrack.appendChild(div);
        });

        // 2. RENDER ZONA ERA
        const eraTrack = document.getElementById('eraTrack');
        eras.forEach(e => {
            let div = document.createElement('div');
            div.className = 'era-item';
            div.style.left = `${getLeft(e.s)}%`;
            div.style.width = `${getWidth(e.s, e.e)}%`;
            let colorStyle = e.color ? `color: ${e.color};` : '';
            div.innerHTML = `<span style="${colorStyle}">${e.name}</span>`;
            eraTrack.appendChild(div);
        });

        // 3. RENDER GRID (Tiap 100 Tahun)
        const gridContainer = document.getElementById('gridContainer');
        for (let y = 4100; y >= -100; y -= 100) {
            if (y === 0) continue;
            let div = document.createElement('div');
            div.className = 'grid-line';
            div.style.left = `${getLeft(y)}%`;
            gridContainer.appendChild(div);
        }

        // 4. RENDER SUMBU BAWAH (Tiap 200 Tahun)
        const axisTrack = document.getElementById('axisTrack');
        for (let y = 4100; y >= -100; y -= 200) {
            if (y === 100) continue;
            let div = document.createElement('div');
            div.className = 'axis-marker';
            div.style.left = `${getLeft(y)}%`;
            let label = y > 0 ? `${y}` : `${Math.abs(y)} M`;
            if (y === 4100) label += " SM";
            div.innerHTML = label;
            axisTrack.appendChild(div);
        }

        const contentArea = document.getElementById('contentArea');

        // 5. STAGGERING ALGORITHM UNTUK BARS
        barsData.sort((a, b) => b.s - a.s);
        let barTracks = [];
        barsData.forEach(bar => {
            let placed = false;
            for (let i = 0; i < barTracks.length; i++) {
                let overlap = barTracks[i].some(ex => Math.max(ex.e, bar.e) < Math.min(ex.s, bar.s) + 30);
                if (!overlap) { bar.track = i; barTracks[i].push(bar); placed = true; break; }
            }
            if (!placed) { bar.track = barTracks.length; barTracks.push([bar]); }
        });

        barsData.forEach(bar => {
            let div = document.createElement('div');
            let fadeClass = bar.f ? ` ${bar.f}` : '';
            div.className = `bar ${bar.t}${fadeClass}`;
            div.style.left = `${getLeft(bar.s)}%`;
            div.style.width = `${getWidth(bar.s, bar.e)}%`;
            div.style.top = `${20 + (bar.track * 32)}px`; 
            div.innerHTML = `<div class="bar-label">${bar.l}</div>`;
            contentArea.appendChild(div);
        });

        let contentHeight = 20 + (barTracks.length * 32) + 120; // Tambah ruang untuk events di bawah

        // 6. STAGGERING ALGORITHM UNTUK EVENTS
        eventsData.sort((a, b) => b.y - a.y);
        let eventLevels = [];
        eventsData.forEach(ev => {
            let placed = false;
            for (let i = 0; i < eventLevels.length; i++) {
                let overlap = eventLevels[i].some(ex => Math.abs(ex.y - ev.y) < 40);
                if (!overlap) { ev.level = i; eventLevels[i].push(ev); placed = true; break; }
            }
            if (!placed) { ev.level = eventLevels.length; eventLevels.push([ev]); }
        });

        eventsData.forEach(ev => {
            let div = document.createElement('div');
            div.className = 'event';
            div.style.left = `${getLeft(ev.y)}%`;
            div.style.top = `${contentHeight + (ev.level * 60)}px`;
            
            let colorStr = ev.y < 50 ? 'border-color:var(--green)' : '';
            let textHtml = ev.cov ? `<span class="covenant">${ev.d}</span>` : ev.d;
            let displayYear = ev.y < 0 ? Math.abs(ev.y) + " M" : ev.y + " SM";

            div.innerHTML = `
                <div class="event-dot" style="${colorStr}"></div>
                <div class="event-year">${displayYear}</div>
                <div class="event-desc">${textHtml}</div>
            `;
            contentArea.appendChild(div);
        });

        // Sesuaikan total tinggi content area
        let totalMaxHeight = contentHeight + (eventLevels.length * 60) + 50;
        contentArea.style.minHeight = `${totalMaxHeight}px`;

        // 7. FUNGSI DRAG & JUMP
        const wrapper = document.getElementById('scrollWrapper');
        const canvas = document.getElementById('timelineCanvas');
        let isDown = false, startX, startY, scrollLeft, scrollTop;

        function scrollToYear(targetYear) {
            const percentage = (MAX_YEAR - targetYear) / TOTAL_YEARS;
            const targetPixel = (percentage * 14000) - (wrapper.clientWidth / 2);
            wrapper.scrollTo({ left: targetPixel, top: 0, behavior: 'smooth' });
        }

        wrapper.addEventListener('mousedown', (e) => {
            isDown = true; wrapper.classList.add('active');
            startX = e.pageX - wrapper.offsetLeft;
            startY = e.pageY - wrapper.offsetTop;
            scrollLeft = wrapper.scrollLeft;
            scrollTop = wrapper.scrollTop;
        });
        wrapper.addEventListener('mouseleave', () => { isDown = false; wrapper.classList.remove('active'); });
        wrapper.addEventListener('mouseup', () => { isDown = false; wrapper.classList.remove('active'); });
        wrapper.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - wrapper.offsetLeft;
            const y = e.pageY - wrapper.offsetTop;
            wrapper.scrollLeft = scrollLeft - ((x - startX) * 1.5);
            wrapper.scrollTop = scrollTop - ((y - startY) * 1.5);
        });
    </script>
</body>
</html>
