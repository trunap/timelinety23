const wrapper=document.getElementById('scrollWrapper'),cursorLabel=document.getElementById('cursorLabel');function updateDynamicAges(){
  let px=clamp(wrapper.scrollLeft,0,CANVAS_WIDTH),cy=clamp(MAX_YEAR-(px/CANVAS_WIDTH)*TOTAL_YEARS,MIN_YEAR,MAX_YEAR),dy=Math.round(cy);
