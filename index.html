<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garis Waktu Alkitab</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --judah: #8e44ad; --israel: #2980b9;
            --bg-color: #fdfbf7; --text-dark: #2c3e50;
            --max-year: 4100; --min-year: -120; 
            --total-years: calc(var(--max-year) - var(--min-year));
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif; background: var(--bg-color);
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- HEADER --- */
        .header {
            background: white; padding: 15px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px; z-index: 1000;
        }
        .header h1 { color: #2c4c4d; margin: 0; font-size: 24px; font-weight: 800; line-height: 1.2; }
        
        .jump-nav { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-nav {
            background: rgba(44, 76, 77, 0.08); color: #2c4c4d; border: none;
            padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-nav:hover { background: #2c4c4d; color: white; }

        /* --- WRAPPER SCROLL --- */
        .scroll-wrapper { flex: 1; width: 100%; overflow: auto; position: relative; scroll-behavior: smooth; cursor: grab; background: #faf9f5; }
        .scroll-wrapper.active { cursor: grabbing; }

        .canvas { width: 17000px; min-height: 100%; position: relative; display: flex; flex-direction: column; }
        .grid-line { position: absolute; top: 0; bottom: 0; width: 1px; border-right: 1px dashed rgba(44, 76, 77, 0.15); z-index: 1; pointer-events: none; }

        /* --- 1. PANEL ATAS (KUASA & ERA) --- */
        .sticky-top { position: sticky; top: 0; left: 0; width: 100%; z-index: 900; background: rgba(253, 251, 247, 0.95); backdrop-filter: blur(8px); border-bottom: 2px solid rgba(0,0,0,0.05); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .track-power { height: 35px; width: 100%; position: relative; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .power-item { position: absolute; height: 100%; display: flex; align-items: center; color: white; font-size: 12px; font-weight: 800; letter-spacing: 1.5px; box-shadow: inset 0 -2px 5px rgba(0,0,0,0.15); }
        .power-item span { position: sticky; left: 20px; padding-right: 20px; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); display: inline-block; }
        
        .track-era { height: 35px; width: 100%; position: relative; display: flex; align-items: center; background: rgba(0,0,0,0.02); }
        .era-item { position: absolute; height: 100%; display: flex; align-items: center; border-left: 2px dashed rgba(44, 76, 77, 0.4); }
        .era-item span { position: sticky; left: 20px; padding-right: 20px; font-size: 11px; font-weight: 700; color: #2c4c4d; display: inline-block; }

        /* --- 2. LAYER TOKOH (MELAYANG/STICKY SAAT DI-SCROLL KE BAWAH) --- */
        .bars-layer {
            position: sticky; top: 72px; width: 100%; z-index: 800;
            background: rgba(253, 251, 247, 0.85); backdrop-filter: blur(5px);
            border-bottom: 2px solid rgba(0,0,0,0.08); box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            pointer-events: none; /* Memungkinkan klik tembus ke events di bawahnya jika kosong */
        }

        .bar-wrapper {
            position: absolute; display: flex; flex-direction: column; justify-content: flex-end;
            height: 24px; pointer-events: auto; cursor: crosshair; transition: transform 0.2s;
        }
        .bar-wrapper:hover { transform: scaleY(1.3); z-index: 50; }
        
        .bar-label {
            position: sticky; left: 20px; font-size: 11.5px; font-weight: 700;
            padding-bottom: 3px; width: max-content;
            text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 0px 2px 4px rgba(0,0,0,0.2);
        }
        .bar-line { width: 100%; height: 8px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }

        /* Tema Warna Garis Waktu */
        .c-cyan .bar-label { color: #0e6655; } .c-cyan .bar-line { background: linear-gradient(180deg, #1abc9c, #16a085); }
        .c-gold .bar-label { color: #d35400; } .c-gold .bar-line { background: linear-gradient(180deg, #f1c40f, #f39c12); }
        .c-red .bar-label { color: #7b241c; } .c-red .bar-line { background: linear-gradient(180deg, #e74c3c, #c0392b); }
        .c-purple .bar-label { color: #512e5f; } .c-purple .bar-line { background: linear-gradient(180deg, #9b59b6, #8e44ad); }
        .c-blue .bar-label { color: #154360; } .c-blue .bar-line { background: linear-gradient(180deg, #3498db, #2980b9); }
        .c-green .bar-label { color: #145a32; } .c-green .bar-line { background: linear-gradient(180deg, #2ecc71, #27ae60); }
        .c-grey .bar-label { color: #424949; } .c-grey .bar-line { background: linear-gradient(180deg, #95a5a6, #7f8c8d); }
        .c-jesus .bar-label { color: #2c3e50; } .c-jesus .bar-line { background: #dcdde1; border: 1px solid #7f8c8d; }

        .fade-left .bar-line { background: linear-gradient(90deg, rgba(0,0,0,0) 0%, currentColor 30%); box-shadow: none; }
        .fade-both .bar-line { background: linear-gradient(90deg, rgba(0,0,0,0) 0%, currentColor 20%, currentColor 80%, rgba(0,0,0,0) 100%); box-shadow: none; }
        .fade-right .bar-line { background: linear-gradient(90deg, currentColor 70%, rgba(0,0,0,0) 100%); box-shadow: none; }

        /* --- 3. LAYER PERISTIWA (EVENTS) --- */
        .events-layer { position: relative; width: 100%; z-index: 10; margin-top: 20px; }

        .event-container { position: absolute; z-index: 5; display: flex; flex-direction: column; align-items: center; }
        .event-container:hover { z-index: 60; }
        
        .event-dot { width: 14px; height: 14px; background: white; border: 4px solid #e27645; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2); position: absolute; left: 50%; transform: translateX(-50%); transition: all 0.2s; z-index: 6; }
        .event-container:hover .event-dot { transform: translateX(-50%) scale(1.5); border-color: #c0392b; }
        
        .event-line { position: absolute; width: 1px; background: rgba(44, 76, 77, 0.3); left: 50%; transform: translateX(-50%); z-index: 4; transition: background 0.2s; }
        .event-container:hover .event-line { background: #c0392b; width: 2px; }

        .event-box { position: absolute; width: 270px; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; background: rgba(255, 255, 255, 0.95); border: 1px solid rgba(0,0,0,0.06); padding: 10px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: transform 0.2s; }
        .event-container:hover .event-box { transform: translateX(-50%) scale(1.03); box-shadow: 0 8px 25px rgba(0,0,0,0.15); border-color: rgba(192, 57, 43, 0.3); }

        .event-year { font-weight: 800; font-size: 13px; color: #b84b1b; margin-bottom: 4px; border-bottom: 1px dashed rgba(0,0,0,0.1); padding-bottom: 2px; width: 100%; text-align: center;}
        .event-desc { font-size: 11px; text-align: center; line-height: 1.5; font-weight: 500; color: #333; margin-bottom: 6px; }
        
        /* Tokoh Hidup Sezaman */
        .contemporaries { font-size: 10px; background: rgba(44, 76, 77, 0.05); padding: 4px 6px; border-radius: 4px; color: #555; text-align: center; width: 100%; font-weight: 500; border: 1px solid rgba(44, 76, 77, 0.1); line-height: 1.4; }
        .covenant { font-weight: 800; font-style: italic; color: #d35400; background: #fcf3cf; border: 1px solid #f1c40f; padding: 2px 6px; border-radius: 4px; font-size: 11px !important; box-shadow: 0 0 8px rgba(241, 196, 15, 0.4); display: inline-block; margin: 3px 0; }

        /* --- 4. SUMBU MELAYANG BAWAH --- */
        .sticky-bottom { position: sticky; bottom: 0; left: 0; width: 100%; z-index: 900; background: linear-gradient(90deg, #b84b1b 0%, #e28e40 50%, #eebb66 100%); height: 45px; display: flex; align-items: center; box-shadow: 0 -4px 15px rgba(0,0,0,0.15); border-top: 1px solid rgba(255,255,255,0.2); }
        .axis-marker { position: absolute; color: white; font-weight: 700; font-size: 12px; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .axis-marker::before { content: ''; width: 2px; height: 6px; background: white; margin-bottom: 3px; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Garis Waktu Alkitab</h1>
        <div class="jump-nav">
            <button class="btn-nav" onclick="scrollToYear(4026)">Adam - Nuh</button>
            <button class="btn-nav" onclick="scrollToYear(2018)">Abraham - Hakim</button>
            <button class="btn-nav" style="color:var(--judah);" onclick="scrollToYear(1100)">Raja-Raja & Nabi</button>
            <button class="btn-nav" onclick="scrollToYear(607)">Babilon - Pemulihan</button>
            <button class="btn-nav" style="background:#27ae60;color:white;" onclick="scrollToYear(50)">Zaman Rasul</button>
        </div>
    </div>

    <div class="scroll-wrapper" id="scrollWrapper">
        <div class="canvas" id="timelineCanvas">
            <div id="gridContainer"></div>

            <div class="sticky-top">
                <div class="track-power" id="powerTrack"></div>
                <div class="track-era" id="eraTrack"></div>
            </div>

            <!-- LAYER TOKOH (Akan terus terlihat menempel di atas saat Anda scroll ke bawah) -->
            <div class="bars-layer" id="barsLayer"></div>

            <!-- LAYER PERISTIWA -->
            <div class="events-layer" id="eventsLayer"></div>

            <div class="sticky-bottom" id="axisTrack"></div>
        </div>
    </div>

    <script>
        const MAX_YEAR = 4100; const MIN_YEAR = -120; 
        const TOTAL_YEARS = MAX_YEAR - MIN_YEAR; const CANVAS_WIDTH = 17000;

        function getLeft(year) { return ((MAX_YEAR - year) / TOTAL_YEARS) * 100; }
        function getWidth(start, end) { return ((start - end) / TOTAL_YEARS) * 100; }
        function getPixelX(year) { return ((MAX_YEAR - year) / TOTAL_YEARS) * CANVAS_WIDTH; }

        // Data Kuasa Dunia & Era
        const powers = [
            { s: 4100, e: 740, name: "MESIR", color: "#8c7647" }, { s: 740, e: 607, name: "ASIRIA", color: "#2c3e50" },
            { s: 607, e: 537, name: "BABILON", color: "#b84b1b" }, { s: 537, e: 332, name: "MEDIA-PERSIA", color: "#2980b9" },
            { s: 332, e: 63, name: "YUNANI", color: "linear-gradient(90deg, #4a6984, #c04e3c)" }, { s: 63, e: -120, name: "ROMA", color: "#c04e3c" }
        ];
        const eras = [

            { s: 607, e: 537, name: "Penawanan di Babilon" }, { s: 537, e: 400, name: "Setelah Masa Penawanan" },
            { s: 75, e: -120, name: "Zaman Yesus dan Para Pengikutnya ➔", color: "#27ae60" }
        ];

        const powerTrack = document.getElementById('powerTrack');
        powers.forEach(p => {
            let div = document.createElement('div'); div.className = 'power-item'; div.style.left = `${getLeft(p.s)}%`; div.style.width = `${getWidth(p.s, p.e)}%`; div.style.background = p.color; div.innerHTML = `<span>${p.name}</span>`; powerTrack.appendChild(div);
        });
        
        const eraTrack = document.getElementById('eraTrack');
        eras.forEach(e => {
            let div = document.createElement('div'); div.className = 'era-item'; div.style.left = `${getLeft(e.s)}%`; div.style.width = `${getWidth(e.s, e.e)}%`; let colorStyle = e.color ? `color: ${e.color};` : ''; div.innerHTML = `<span style="${colorStyle}">${e.name}</span>`; eraTrack.appendChild(div);
        });

        // ---------------- DATA TOKOH (BERDASARKAN RISET WOL.JW.ORG) ----------------
        const barsData = [
            { s: 4026, e: 3096, l: "Adam (930 thn)", t: "c-cyan" }, { s: 3896, e: 2984, l: "Set (912 thn)", t: "c-cyan" },
            { s: 3404, e: 3039, l: "Henokh (365 thn)", t: "c-cyan" }, { s: 3339, e: 2370, l: "Metusalah (969 thn)", t: "c-cyan" },
            { s: 3152, e: 2377, l: "Lamekh (777 thn)", t: "c-cyan" }, { s: 2970, e: 2020, l: "Nuh (950 thn)", t: "c-cyan" },

            { s: 1858, e: 1711, l: "Yakub (147 thn)", t: "c-gold" }, { s: 1795, e: 1700, l: "Ismael (137 thn)", t: "c-gold" },
            { s: 1767, e: 1657, l: "Yusuf (110 thn)", t: "c-gold" },
            
            { s: 1650, e: 1470, l: "Syifra, Pua, Amram, Yokhebed, Miriam", t: "c-red fade-both" },
            { s: 1593, e: 1473, l: "Musa (120 thn)", t: "c-red" }, { s: 1560, e: 1450, l: "Yosua (110 thn)", t: "c-red fade-left" },
            { s: 1550, e: 1430, l: "Kaleb", t: "c-red fade-left" }, { s: 1500, e: 1400, l: "Rahab", t: "c-red fade-left" },

            { s: 1107, e: 1037, l: "Daud (70 thn)", t: "c-grey" }, { s: 1100, e: 1007, l: "Yonatan", t: "c-grey fade-right" },
            { s: 1055, e: 995, l: "Abigail, Natan", t: "c-grey fade-both" },
            
            { s: 920, e: 890, l: "Elia", t: "c-green fade-both" }, { s: 893, e: 840, l: "Elisa", t: "c-green" },
            { s: 778, e: 732, l: "Yesaya", t: "c-green fade-both" }, { s: 647, e: 580, l: "Yeremia", t: "c-green fade-both" },

            { s: 997, e: 976, l: "Yeroboam", t: "c-blue" }, { s: 975, e: 952, l: "Baasya", t: "c-blue" }, { s: 947, e: 940, l: "Omri", t: "c-blue" }, { s: 940, e: 920, l: "Ahab", t: "c-blue" }, { s: 905, e: 876, l: "Yehu", t: "c-blue" }, { s: 844, e: 803, l: "Yeroboam II", t: "c-blue" }, { s: 778, e: 758, l: "Pekah", t: "c-blue" }, { s: 758, e: 740, l: "Hosyea", t: "c-blue" },
            
            { s: 80, e: -10, l: "Zakharia & Elisabet", t: "c-green fade-both" }, { s: 35, e: -50, l: "Maria (ibu Yesus)", t: "c-green fade-both" }, { s: 40, e: -20, l: "Yusuf (Suami)", t: "c-green fade-both" }, { s: 2, e: -32, l: "Yohanes Pembaptis", t: "c-green" }, { s: 2, e: -33, l: "Yesus (33 thn)", t: "c-jesus" }, { s: 10, e: -65, l: "Petrus", t: "c-green fade-both" }, { s: -5, e: -65, l: "Paulus", t: "c-green fade-both" }, { s: -5, e: -100, l: "Rasul Yohanes", t: "c-green fade-both" }
        ];

        const barsLayer = document.getElementById('barsLayer');

        // Render Bars di Panel Sticky
        barsData.sort((a, b) => b.s - a.s);
        let barTracks = [];
        barsData.forEach(bar => {
            let placed = false;
            for (let i = 0; i < barTracks.length; i++) {
                let overlap = barTracks[i].some(ex => Math.max(ex.e, bar.e) < Math.min(ex.s, bar.s) + 25);
                if (!overlap) { bar.track = i; barTracks[i].push(bar); placed = true; break; }
            }
            if (!placed) { bar.track = barTracks.length; barTracks.push([bar]); }
        });

        barsData.forEach(bar => {
            let div = document.createElement('div');
            let fadeClass = bar.f ? ` ${bar.f}` : '';
            div.className = `bar-wrapper ${bar.t}${fadeClass}`;
            div.style.left = `${getLeft(bar.s)}%`; 
            div.style.width = `${getWidth(bar.s, bar.e)}%`; 
            div.style.top = `${15 + (bar.track * 26)}px`; // Kompak agar tidak menghabiskan terlalu banyak layar
            
            div.innerHTML = `
                <span class="bar-label">${bar.l}</span>
                <div class="bar-line"></div>
            `;
            barsLayer.appendChild(div);
        });

        // Set tinggi panel Sticky Bars
        barsLayer.style.height = `${15 + (barTracks.length * 26) + 15}px`;


        // ---------------- DATA PERISTIWA ----------------

            { y: 3896, d: "Kain membunuh Habel<br>Kelahiran Set" }, { y: 3404, d: "Kelahiran Henokh" }, { y: 3339, d: "Kelahiran Metusalah" }, { y: 3152, d: "Kelahiran Lamekh" }, { y: 3096, d: "Kematian Adam" }, { y: 3039, d: "Henokh digaibkan" }, { y: 2970, d: "Kelahiran Nuh" }, { y: 2490, d: "Pernyataan hukuman Allah" }, { y: 2470, d: "Kelahiran Yafet" }, { y: 2468, d: "Kelahiran Sem" },

        const eventsLayer = document.getElementById('eventsLayer');
        const groupedEvents = [];
        
        rawEvents.forEach(ev => {
            let existing = groupedEvents.find(g => g.y === ev.y);
            if (existing) { existing.d += `<br><span style="display:block;border-top:1px dashed rgba(0,0,0,0.1);margin:4px 0;"></span>${ev.d}`; } else { groupedEvents.push({...ev}); }
        });

        groupedEvents.sort((a, b) => b.y - a.y);
        let eventLevels = [];
        groupedEvents.forEach(ev => {
            let placed = false;
            let evX = getPixelX(ev.y); 
            for (let i = 0; i < eventLevels.length; i++) {
                let overlap = eventLevels[i].some(ex => Math.abs(getPixelX(ex.y) - evX) < 280);
                if (!overlap) { ev.level = i; eventLevels[i].push(ev); placed = true; break; }
            }
            if (!placed) { ev.level = eventLevels.length; eventLevels.push([ev]); }
        });

        // Merender Event berserta Sistem Pintar "Tokoh Hidup Sezaman"
        groupedEvents.forEach(ev => {
            let containerDiv = document.createElement('div');
            containerDiv.className = 'event-container';
            containerDiv.style.left = `${getLeft(ev.y)}%`;
            containerDiv.style.top = `0px`; // Base of eventsLayer

            let levelY = 20 + (ev.level * 125); // Jarak antar level yang cukup lega untuk teks
            let dotColor = ev.y < 50 ? 'border-color:#27ae60' : '';
            let displayYear = ev.y < 0 ? Math.abs(ev.y) + " M" : ev.y + " SM";

            // LOGIKA TOKOH SEZAMAN
            let aliveNames = barsData.filter(b => b.s >= ev.y && b.e <= ev.y).map(b => b.l.split(' (')[0]);
            let contemporariesHtml = '';
            if (aliveNames.length > 0) {
                contemporariesHtml = `<div class="contemporaries"><strong>Hidup Saat Ini:</strong><br>${aliveNames.join(', ')}</div>`;
            }

            containerDiv.innerHTML = `
                <div class="event-dot" style="${dotColor}"></div>
                <div class="event-line" style="height: ${levelY}px"></div>
                <div class="event-box" style="top: ${levelY}px;">
                    <div class="event-year">${displayYear}</div>
                    <div class="event-desc">${ev.d}</div>
                    ${contemporariesHtml}
                </div>
            `;
            eventsLayer.appendChild(containerDiv);
        });

        let totalMaxHeight = (eventLevels.length * 125) + 150;
        eventsLayer.style.minHeight = `${totalMaxHeight}px`;

        // Render Grid & Sumbu
        const gridContainer = document.getElementById('gridContainer');
        for (let y = 4100; y >= -100; y -= 100) { if (y === 0) continue; let div = document.createElement('div'); div.className = 'grid-line'; div.style.left = `${getLeft(y)}%`; gridContainer.appendChild(div); }

        const axisTrack = document.getElementById('axisTrack');
        for (let y = 4100; y >= -100; y -= 200) {
            if (y === 100) continue;
            let div = document.createElement('div'); div.className = 'axis-marker'; div.style.left = `${getLeft(y)}%`; let label = y > 0 ? `${y}` : `${Math.abs(y)} M`; if (y === 4100) label += " SM"; div.innerHTML = label; axisTrack.appendChild(div);
        }

        // FUNGSI DRAG KANVAS & NAV JUMP
        const wrapper = document.getElementById('scrollWrapper');
        let isDown = false, startX, startY, scrollLeft, scrollTop;

        function scrollToYear(targetYear) {
            const percentage = (MAX_YEAR - targetYear) / TOTAL_YEARS;
            const targetPixel = (percentage * CANVAS_WIDTH) - (wrapper.clientWidth / 2);
            wrapper.scrollTo({ left: targetPixel, top: 0, behavior: 'smooth' });
        }

        wrapper.addEventListener('mousedown', (e) => { isDown = true; wrapper.classList.add('active'); startX = e.pageX - wrapper.offsetLeft; startY = e.pageY - wrapper.offsetTop; scrollLeft = wrapper.scrollLeft; scrollTop = wrapper.scrollTop; });
        wrapper.addEventListener('mouseleave', () => { isDown = false; wrapper.classList.remove('active'); });
        wrapper.addEventListener('mouseup', () => { isDown = false; wrapper.classList.remove('active'); });
        wrapper.addEventListener('mousemove', (e) => { if (!isDown) return; e.preventDefault(); const x = e.pageX - wrapper.offsetLeft; const y = e.pageY - wrapper.offsetTop; wrapper.scrollLeft = scrollLeft - ((x - startX) * 1.5); wrapper.scrollTop = scrollTop - ((y - startY) * 1.5); });
    </script>
